<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-store">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a5c2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="FAP FAP">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <title>FAP FAP 2026 — Table Live</title>

    <!-- auth-guard en tête : masque le body + vérifie JWT avant tout rendu -->
    <script src="auth-guard.js"></script>

    <!-- Styles : global → layout jeu responsive -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="game-layout.css">
</head>
<body>

    <!-- ── En-tête ───────────────────────────────── -->
    <header class="admin-header">
        <h1><span>♠️</span> FAP FAP Kmer</h1>

        <div id="turn-timer">
            <div id="timer-bar-bg"><div id="timer-bar"></div></div>
            <span id="timer-sec">30</span>s
        </div>

        <div class="menu-bars">
            <button class="btn-action btn-stand" id="btn-leave-table" onclick="handleLeave()">SE LEVER</button>
            <button class="btn-action btn-leave" onclick="leaveClub()">QUITTER</button>
        </div>
    </header>

    <!-- ── Panneau Historique ─────────────────────── -->
    <div class="history-panel">
        <div class="history-header">
            <span>HISTORIQUE</span>
            <!-- Bouton fermeture tiroir (visible uniquement sur mobile) -->
            <button class="drawer-close-btn" onclick="closeDrawer()" aria-label="Fermer">✕</button>
        </div>
        <div id="history-list"></div>
    </div>

    <!-- ── Panneau Chat ───────────────────────────── -->
    <div class="chat-panel">
        <div class="history-header">
            <span>CHAT CLUB</span>
            <button class="drawer-close-btn" onclick="closeDrawer()" aria-label="Fermer">✕</button>
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Message…" autocomplete="off">
            <button class="btn-chat-send" onclick="sendChatMessage()">OK</button>
        </div>
    </div>

    <!-- ── Annonce flash ──────────────────────────── -->
    <div id="announcement"></div>

    <!-- ── Table de jeu ───────────────────────────── -->
    <div class="poker-table">
        <div class="watermark">♠</div>

        <!-- Zones cartes posées -->
        <div id="pz-1" class="play-zone pz-1"></div>
        <div id="pz-2" class="play-zone pz-2"></div>
        <div id="pz-3" class="play-zone pz-3"></div>
        <div id="pz-4" class="play-zone pz-4"></div>

        <!-- Centre : pot + statut + bouton distribuer -->
        <div class="pot-area">
            <h1 id="total-pot">0 FCFA</h1>
            <p id="status-msg">Prêt pour le Fap Fap ?</p>
            <button id="distribBtn" onclick="requestDistribute()"
                style="display:none;background:var(--gold);color:black;font-weight:bold;padding:12px 25px;border-radius:25px;cursor:pointer;border:none;margin-top:10px;box-shadow:0 4px 15px rgba(0,0,0,0.3);">
                DISTRIBUER (3+2)
            </button>
        </div>

        <!-- Slot haut (joueur 2) -->
        <div class="player-slot p-top" id="slot-2">
            <div class="avatar" id="av-2"></div>
            <div class="name-tag" id="n-2">Vide</div>
            <div id="bal-2" style="font-size:0.72rem;color:var(--gold);min-height:1em;"></div>
            <div class="mini-hand" id="h-2"></div>
        </div>

        <!-- Slot gauche (joueur 3) -->
        <div class="player-slot p-left" id="slot-3">
            <div class="avatar" id="av-3"></div>
            <div class="name-tag" id="n-3">Vide</div>
            <div id="bal-3" style="font-size:0.72rem;color:var(--gold);min-height:1em;"></div>
            <div class="mini-hand" id="h-3"></div>
        </div>

        <!-- Slot droite (joueur 4) -->
        <div class="player-slot p-right" id="slot-4">
            <div class="avatar" id="av-4"></div>
            <div class="name-tag" id="n-4">Vide</div>
            <div id="bal-4" style="font-size:0.72rem;color:var(--gold);min-height:1em;"></div>
            <div class="mini-hand" id="h-4"></div>
        </div>

        <!-- Slot bas (moi — joueur 1) -->
        <div class="player-slot p-bottom" id="slot-1">
            <div id="special-actions"></div>
            <div id="my-hand" class="hand"></div>
            <div class="avatar" id="my-avatar"></div>
            <div class="name-tag" id="my-name">Spectateur</div>
            <div id="my-wallet-amount" style="font-size:0.9rem;color:var(--gold);margin-top:5px;">0 FCFA</div>
        </div>
    </div>

    <!-- ── Signature ──────────────────────────────── -->
    <div class="footer-branding">
        FAP FAP Kmer 2.2 | Made in Cameroun | <b>Solution Makers</b> | © walisylver
    </div>

    <!-- ── Modal zoom carte ──────────────────────── -->
    <div id="card-zoom-modal" onclick="closeCardZoom()">
        <div class="card-zoom-inner">
            <div id="card-zoom-face" class="card-zoom-face">
                <span class="czv-top"    id="czv-top">—</span>
                <span class="czs-center" id="czs-center">♠</span>
                <span class="czv-bottom" id="czv-bottom">—</span>
            </div>
            <div id="card-zoom-player"></div>
            <div id="card-zoom-hint">Appuyer pour fermer</div>
        </div>
    </div>

    <!-- ── Modal victoire ────────────────────────── -->
    <div id="winner-modal">
        <div class="modal-content">
            <h1 style="color:var(--gold);font-size:3.5rem;margin:0;text-shadow:0 0 20px rgba(241,196,15,0.5);">VICTOIRE !</h1>
            <div id="winner-avatar" class="winner-avatar-big"></div>
            <h2 id="winner-name" style="font-size:2rem;color:white;margin:10px 0;">Joueur</h2>
            <p style="font-size:1rem;color:#aaa;margin-bottom:5px;">A raflé le pot de :</p>
            <p id="winner-gain" style="font-size:2.5rem;color:#2ecc71;font-weight:bold;margin:0;">0 FCFA</p>
            <button onclick="closeWinnerModal()"
                style="margin-top:32px;background:var(--gold);color:black;border:none;padding:14px 36px;border-radius:50px;font-size:1.1rem;font-weight:bold;cursor:pointer;">
                REJOUER UNE MANCHE
            </button>
        </div>
    </div>

    <!-- ── Modal changer de table ─────────────────── -->
    <div id="modal-change-table">
        <div class="ct-box">
            <h2>Changer de table</h2>
            <div class="ct-list" id="ct-table-list">
                <p style="color:#666;text-align:center;padding:20px 0">Chargement…</p>
            </div>
            <div class="ct-actions">
                <button class="ct-btn-salon"  onclick="goToSalon()">Retour au salon</button>
                <button class="ct-btn-cancel" onclick="closeChangeTable()">Annuler</button>
            </div>
        </div>
    </div>

    <!-- ── Scripts ───────────────────────────────── -->
    <!-- Ordre impératif : config → socket.io → game-scale → game -->
    <script src="config.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="game-scale.js"></script>
    <script src="game.js"></script>

</body>
</html>
