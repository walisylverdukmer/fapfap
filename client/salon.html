<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store">
    <script src="auth-guard.js"></script>
    <title>FAP FAP — Salon de jeu</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .salon-header {
            background: #000;
            padding: 0 20px;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            flex-shrink: 0;
        }
        .salon-header h1 {
            color: var(--gold);
            font-size: 1.3rem;
            margin: 0;
            letter-spacing: 2px;
        }
        .salon-header .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9rem;
        }
        .salon-header .user-info span { color: #ccc; }
        .salon-header .user-info strong { color: var(--gold); }

        .salon-content {
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .salon-subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }

        /* Grille des tables */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .table-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 18px;
            position: relative;
            transition: border-color 0.2s;
        }
        .table-card:hover { border-color: var(--gold); }
        .table-card.status-playing { border-color: #e74c3c; }
        .table-card.status-open { border-color: #2ecc71; }

        .table-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .table-card-name {
            font-size: 1.05rem;
            font-weight: bold;
            color: var(--gold);
        }
        .table-status-badge {
            font-size: 0.72rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-open    { background: #1a4731; color: #2ecc71; }
        .badge-playing { background: #4a1010; color: #e74c3c; }

        .table-card-info {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .table-card-info span strong { color: #fff; }

        .seats-bar {
            display: flex;
            gap: 5px;
            margin-bottom: 14px;
        }
        .seat-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
        }
        .seat-dot.taken { background: var(--gold); border-color: var(--gold); }
        .seat-dot.free  { background: transparent; }

        .table-card-actions {
            display: flex;
            gap: 8px;
        }
        .btn-sit-table {
            flex: 1;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 9px 0;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-sit-table:hover { background: var(--gold-dark); }
        .btn-sit-table:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }
        .btn-observe {
            background: transparent;
            border: 1px solid #555;
            color: #aaa;
            border-radius: 6px;
            padding: 9px 14px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-observe:hover { border-color: #aaa; color: #fff; }

        .players-list {
            font-size: 0.78rem;
            color: #777;
            margin-bottom: 8px;
        }
        .players-list .player-chip {
            display: inline-block;
            background: #2a2a2a;
            border-radius: 10px;
            padding: 2px 8px;
            margin: 2px;
            color: #ccc;
        }

        /* Panel admin */
        .admin-panel {
            display: none;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--gold-dark);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .admin-panel.visible { display: block; }
        .admin-panel h3 { color: var(--gold); margin-top: 0; font-size: 1rem; }
        .admin-panel .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .admin-panel input, .admin-panel select {
            background: #222;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            padding: 9px 12px;
            font-size: 0.85rem;
            flex: 1;
            min-width: 120px;
        }
        .admin-panel button {
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 9px 20px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .admin-panel button:hover { background: var(--gold-dark); }

        /* Modal de confirmation */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #1e1e1e;
            border: 1px solid var(--gold);
            border-radius: 14px;
            padding: 30px;
            max-width: 380px;
            width: 90%;
            text-align: center;
        }
        .modal-box h2 { color: var(--gold); margin-top: 0; font-size: 1.2rem; }
        .modal-box p  { color: #ccc; font-size: 0.9rem; margin-bottom: 20px; }
        .modal-box .modal-actions { display: flex; gap: 10px; justify-content: center; }
        .modal-box .btn-confirm {
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 11px 24px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .modal-box .btn-cancel {
            background: transparent;
            border: 1px solid #555;
            color: #aaa;
            border-radius: 8px;
            padding: 11px 24px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .modal-box .btn-cancel:hover { border-color: #aaa; color: #fff; }

        /* Connexion état */
        #connection-status {
            position: fixed;
            bottom: 16px;
            right: 16px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: bold;
            z-index: 500;
        }
        #connection-status.connected    { background: #1a4731; color: #2ecc71; }
        #connection-status.disconnected { background: #4a1010; color: #e74c3c; }

        #loading-msg {
            text-align: center;
            color: #888;
            padding: 40px;
        }
        .btn-logout {
            background: transparent;
            border: 1px solid #555;
            color: #aaa;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .btn-logout:hover { border-color: #e74c3c; color: #e74c3c; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="salon-header">
        <h1>FAP FAP — SALON</h1>
        <div class="user-info">
            <span>Connecté : <strong id="header-username">...</strong></span>
            <span id="rs-badge-slot"></span>
            <button class="btn-logout" onclick="logout()">Déconnexion</button>
        </div>
    </div>

    <div class="salon-content">
        <p class="salon-subtitle" id="salon-subtitle">Choisissez une table pour jouer.</p>

        <!-- Panel admin (superadmin / katika uniquement) -->
        <div class="admin-panel" id="admin-panel">
            <h3>Créer une table</h3>
            <div class="form-row">
                <input type="text"   id="new-table-name"     placeholder="Nom de la table" maxlength="50">
                <input type="number" id="new-table-bet"      placeholder="Mise min (FCFA)" value="100" min="0">
                <select             id="new-table-players">
                    <option value="2">2 joueurs</option>
                    <option value="4" selected>4 joueurs</option>
                    <option value="6">6 joueurs</option>
                    <option value="8">8 joueurs</option>
                </select>
                <button onclick="createTable()">Créer</button>
            </div>
        </div>

        <!-- Grille des tables -->
        <div id="loading-msg">Chargement du salon...</div>
        <div class="tables-grid" id="tables-grid" style="display:none"></div>
    </div>

    <!-- Modal : s'asseoir -->
    <div class="modal-overlay" id="modal-sit">
        <div class="modal-box">
            <h2 id="modal-sit-title">S'asseoir à la table</h2>
            <p id="modal-sit-body">Mise minimale : <strong id="modal-sit-bet">—</strong> FCFA</p>
            <div class="modal-actions">
                <button class="btn-confirm" onclick="confirmSit()">S'asseoir</button>
                <button class="btn-cancel"  onclick="closeModals()">Annuler</button>
            </div>
        </div>
    </div>

    <!-- Modal : observer -->
    <div class="modal-overlay" id="modal-observe">
        <div class="modal-box">
            <h2 id="modal-obs-title">Observer la table</h2>
            <p>Vous regarderez la partie sans participer ni miser.</p>
            <div class="modal-actions">
                <button class="btn-confirm" onclick="confirmObserve()">Observer</button>
                <button class="btn-cancel"  onclick="closeModals()">Annuler</button>
            </div>
        </div>
    </div>

    <!-- Statut connexion -->
    <div id="connection-status" class="disconnected">Déconnecté</div>

    <script src="config.js"></script>
    <script src="role-switcher.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="salon.js"></script>
</body>
</html>
